spring:

  application:
    name: gateway-api

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: crud-template
              uri: http://localhost:8081

              predicates:
                - Path=/api/v1/crud/**
                - Method=GET,POST,PUT
                - Header=TEST-HEADER,test
server:
  port: 8080